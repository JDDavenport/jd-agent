name: JDVault
options:
  bundleIdPrefix: com.jdagent
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 5744Y4WB6M
    CODE_SIGN_STYLE: Automatic

targets:
  JDVault:
    type: application
    platform: iOS
    sources:
      - JDVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdagent.vault
        INFOPLIST_FILE: JDVault/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false

  JDVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - JDVaultUITests
    dependencies:
      - target: JDVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jdagent.vault.uitests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
