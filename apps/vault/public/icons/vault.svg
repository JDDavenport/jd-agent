<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="vaultBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="vaultDoor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="metalRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="innerDial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <filter id="vaultShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity="0.2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#vaultBg)"/>

  <!-- Decorative pattern -->
  <g opacity="0.08">
    <circle cx="100" cy="412" r="200" fill="#fff"/>
    <circle cx="412" cy="100" r="150" fill="#fff"/>
  </g>

  <!-- Vault door base -->
  <g filter="url(#vaultShadow)">
    <circle cx="256" cy="256" r="160" fill="url(#vaultDoor)"/>

    <!-- Door border -->
    <circle cx="256" cy="256" r="155" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="256" cy="256" r="148" fill="none" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <!-- Golden combination dial ring -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#metalRing)" stroke-width="16"/>
  <circle cx="256" cy="256" r="98" fill="none" stroke="#fcd34d" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="256" r="82" fill="none" stroke="#d97706" stroke-width="1" opacity="0.5"/>

  <!-- Dial notches -->
  <g stroke="#92400e" stroke-width="2" stroke-linecap="round">
    <line x1="256" y1="166" x2="256" y2="178"/>
    <line x1="256" y1="346" x2="256" y2="334"/>
    <line x1="346" y1="256" x2="334" y2="256"/>
    <line x1="166" y1="256" x2="178" y2="256"/>
    <!-- Diagonal notches -->
    <line x1="320" y1="192" x2="311" y2="201" opacity="0.6"/>
    <line x1="320" y1="320" x2="311" y2="311" opacity="0.6"/>
    <line x1="192" y1="320" x2="201" y2="311" opacity="0.6"/>
    <line x1="192" y1="192" x2="201" y2="201" opacity="0.6"/>
  </g>

  <!-- Center dial -->
  <circle cx="256" cy="256" r="60" fill="url(#innerDial)" filter="url(#innerShadow)"/>
  <circle cx="256" cy="256" r="56" fill="none" stroke="#475569" stroke-width="2"/>

  <!-- Dial indicator -->
  <polygon points="256,200 248,220 264,220" fill="#f59e0b"/>

  <!-- Center knob -->
  <circle cx="256" cy="256" r="20" fill="#1e293b"/>
  <circle cx="256" cy="256" r="16" fill="#334155"/>
  <circle cx="256" cy="256" r="8" fill="#475569"/>
  <circle cx="252" cy="252" r="3" fill="#64748b" opacity="0.6"/>

  <!-- Handle bar -->
  <g filter="url(#vaultShadow)">
    <rect x="340" y="236" width="80" height="40" rx="6" fill="url(#metalRing)"/>
    <rect x="346" y="242" width="68" height="28" rx="4" fill="#fcd34d" opacity="0.3"/>
    <rect x="340" y="236" width="80" height="40" rx="6" fill="none" stroke="#d97706" stroke-width="1"/>
  </g>

  <!-- Lock bolts -->
  <g fill="#94a3b8">
    <rect x="400" y="180" width="16" height="32" rx="4"/>
    <rect x="400" y="300" width="16" height="32" rx="4"/>
  </g>

  <!-- Shine effect -->
  <ellipse cx="200" cy="200" rx="60" ry="40" fill="#fff" opacity="0.1" transform="rotate(-45 200 200)"/>
</svg>
