<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
    <line x1="80" y1="170" x2="432" y2="170"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="342" x2="432" y2="342"/>
  </g>

  <!-- Central orb / control node -->
  <circle cx="256" cy="256" r="48" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="32" fill="#fff"/>
  <circle cx="256" cy="256" r="16" fill="#4f46e5"/>

  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="100" ry="100" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4"/>

  <!-- Connection nodes -->
  <g filter="url(#shadow)">
    <!-- Top -->
    <circle cx="256" cy="116" r="24" fill="#fff"/>
    <circle cx="256" cy="116" r="12" fill="#22d3ee"/>

    <!-- Right -->
    <circle cx="396" cy="256" r="24" fill="#fff"/>
    <circle cx="396" cy="256" r="12" fill="#34d399"/>

    <!-- Bottom -->
    <circle cx="256" cy="396" r="24" fill="#fff"/>
    <circle cx="256" cy="396" r="12" fill="#f472b6"/>

    <!-- Left -->
    <circle cx="116" cy="256" r="24" fill="#fff"/>
    <circle cx="116" cy="256" r="12" fill="#fbbf24"/>
  </g>

  <!-- Connection lines to center -->
  <g stroke="#fff" stroke-width="3" opacity="0.5">
    <line x1="256" y1="140" x2="256" y2="208"/>
    <line x1="372" y1="256" x2="304" y2="256"/>
    <line x1="256" y1="372" x2="256" y2="304"/>
    <line x1="140" y1="256" x2="208" y2="256"/>
  </g>

  <!-- Decorative corner accents -->
  <g fill="#fff" opacity="0.15">
    <rect x="72" y="72" width="48" height="4" rx="2"/>
    <rect x="72" y="72" width="4" height="48" rx="2"/>
    <rect x="392" y="72" width="48" height="4" rx="2"/>
    <rect x="436" y="72" width="4" height="48" rx="2"/>
    <rect x="72" y="436" width="48" height="4" rx="2"/>
    <rect x="72" y="392" width="4" height="48" rx="2"/>
    <rect x="392" y="436" width="48" height="4" rx="2"/>
    <rect x="436" y="392" width="4" height="48" rx="2"/>
  </g>
</svg>
